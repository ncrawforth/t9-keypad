# Enable Bluetooth support
CONFIG_ZMK_BLE=y

# Increase transmission power (helps with connection stability)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Give your keyboard a recognizable name
CONFIG_ZMK_KEYBOARD_NAME="T9 Keypad"

# Enable deep sleep support
CONFIG_ZMK_SLEEP=y

# Time before entering idle state (30 seconds in milliseconds)
CONFIG_ZMK_IDLE_TIMEOUT=30000

# Time before entering deep sleep (15 minutes in milliseconds)
# 15 min * 60 sec * 1000 ms = 900,000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
